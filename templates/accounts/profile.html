{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile · PlantCareLog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/theme.css' %}">
<link rel="stylesheet" href="{% static 'css/profile.css' %}">
</head>
<body>

<div class="topbar">
  <div class="brand">PlantCareLog</div>
  <nav><a href="{% url 'dashboard' %}">Dashboard</a></nav>
</div>

<main>
  <h1>My profile</h1>

  {% if messages %}
  {% for message in messages %}
  <div class="alert alert-{{ message.tags }}">{{ message }}</div>
  {% endfor %}
  {% endif %}

  <div class="panel">
    <form method="post">
      {% csrf_token %}
      <div class="field">
        <label>Full name</label>
        <input type="text" name="full_name" value="{{ profile.full_name }}" required>
      </div>
      <div class="field">
        <label>Username</label>
        <div class="readonly">{{ profile.username }}</div>
      </div>
      <div class="field">
        <label>Email</label>
        <div class="readonly">{{ profile.email }}</div>
      </div>

      <button type="submit" class="btn-primary btn-auto">Save changes</button>
    </form>
  </div>
</main>

</body>
</html>
