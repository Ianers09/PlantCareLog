{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile · PlantCareLog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/theme.css' %}">
<style>
  .topbar{ display:flex; align-items:center; justify-content:space-between; padding: 1.1rem 2rem; background: var(--forest); color: var(--paper); }
  .topbar .brand{ font-family:'Fraunces', serif; font-weight:600; font-size: 1.15rem; }
  .topbar nav a{ color: var(--sage); margin-left: 1.2rem; }
  .topbar nav a:hover{ color: var(--paper); }

  main{ max-width: 560px; margin: 0 auto; padding: 2.6rem 2rem 4rem; }
  main h1{ font-family:'Fraunces', serif; font-weight: 500; font-size: 1.7rem; margin: 0 0 1.6rem 0; }

  .panel{ background:#fff; border: 1px solid var(--paper-dim); border-radius: 10px; padding: 1.6rem 1.7rem; }
  .readonly{ padding: 0.72rem 0.85rem; background: var(--paper-dim); border-radius: 8px; font-size: 0.92rem; color: var(--ink-soft); }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">PlantCareLog</div>
  <nav><a href="{% url 'dashboard' %}">Dashboard</a></nav>
</div>

<main>
  <h1>My profile</h1>

  {% if messages %}
  {% for message in messages %}
  <div class="alert alert-{{ message.tags }}">{{ message }}</div>
  {% endfor %}
  {% endif %}

  <div class="panel">
    <form method="post">
      {% csrf_token %}
      <div class="field">
        <label>Full name</label>
        <input type="text" name="full_name" value="{{ profile.full_name }}" required>
      </div>
      <div class="field">
        <label>Username</label>
        <div class="readonly">{{ profile.username }}</div>
      </div>
      <div class="field">
        <label>Email</label>
        <div class="readonly">{{ profile.email }}</div>
      </div>

      <button type="submit" class="btn-primary" style="width:auto;">Save changes</button>
    </form>
  </div>
</main>

</body>
</html>
